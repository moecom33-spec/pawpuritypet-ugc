<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:Arial,sans-serif;padding:8px;}
.paw-top{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:12px;}
.paw-top span{font-size:10px;font-weight:700;color:#555;letter-spacing:.08em;text-transform:uppercase;}
.paw-dot{width:4px;height:4px;border-radius:50%;background:#3a8c3f;display:inline-block;}
.paw-bubbles{display:flex;align-items:center;justify-content:center;}
.paw-bw{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex:1;padding:0 4px;}
.paw-bubble{width:72px;height:72px;border-radius:50%;overflow:hidden;position:relative;border:2.5px solid #e0e0e0;transition:all .22s;background:#f5f5f5;flex-shrink:0;}
.paw-bubble img{width:100%;height:100%;object-fit:cover;filter:brightness(.68);transition:filter .22s;display:block;}
.paw-pl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.paw-pl div{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;font-size:10px;padding-left:2px;color:#3a8c3f;box-shadow:0 1px 6px rgba(0,0,0,.2);}
.paw-bubble.on{border-color:#3a8c3f;box-shadow:0 0 0 3px rgba(58,140,63,.15);transform:scale(1.06);}
.paw-bubble.on img{filter:brightness(1);}
.paw-bubble.on .paw-pl{display:none;}
.paw-ln{color:#1a1a1a;font-weight:700;font-size:11px;text-align:center;}
.paw-ls{color:#999;font-size:10px;text-align:center;}
.paw-bw.on .paw-ln{color:#3a8c3f;}
.paw-sep{width:1px;height:44px;background:#ebebeb;flex-shrink:0;align-self:center;}
#paw-player{display:none;margin-top:12px;position:relative;border-radius:16px;overflow:hidden;background:#000;width:100%;max-width:380px;margin-left:auto;margin-right:auto;aspect-ratio:1/1;}
#paw-player.open{display:block;}
#paw-vid{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
#paw-cls{position:absolute;top:10px;right:10px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.8);border:2.5px solid rgba(255,255,255,.8);color:#fff;font-size:22px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;padding:0;font-weight:900;}
#paw-ntag{position:absolute;bottom:12px;left:12px;display:flex;align-items:center;gap:8px;}
.paw-av{width:30px;height:30px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.9);}
.paw-av img{width:100%;height:100%;object-fit:cover;}
.paw-nf{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.9);}
.paw-ns{font-size:10px;color:rgba(255,255,255,.85);text-shadow:0 1px 6px rgba(0,0,0,.9);}
#paw-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.2);}
#paw-bar{height:100%;background:#fff;width:0%;}
</style>
</head>

var cur=0,raf=null;
function pawOpen(n){
  if(cur){document.getElementById('pb'+cur).classList.remove('on');document.getElementById('pw'+cur).classList.remove('on');}
  cur=n;
  document.getElementById('pb'+n).classList.add('on');document.getElementById('pw'+n).classList.add('on');
  var vid=document.getElementById('paw-vid');
  vid.src=srcs[n];vid.load();vid.play();
  var d=names[n];
  document.getElementById('paw-ntag').innerHTML='<div class="paw-av"><img src="data:image/jpeg;base64,'+d.t+'" alt=""></div><div><div class="paw-nf">'+d.n+'</div><div class="paw-ns">'+d.s+'</div></div>';
  if(raf)cancelAnimationFrame(raf);
  (function tick(){if(vid.duration)document.getElementById('paw-bar').style.width=(vid.currentTime/vid.duration*100)+'%';raf=requestAnimationFrame(tick);})();
  document.getElementById('paw-player').classList.add('open');
}
function pawClose(){
  document.getElementById('paw-player').classList.remove('open');
  var vid=document.getElementById('paw-vid');vid.pause();vid.src='';
  if(raf){cancelAnimationFrame(raf);raf=null;}
  document.getElementById('paw-bar').style.width='0%';
  if(cur){document.getElementById('pb'+cur).classList.remove('on');document.getElementById('pw'+cur).classList.remove('on');}
  cur=0;
}
</script>
